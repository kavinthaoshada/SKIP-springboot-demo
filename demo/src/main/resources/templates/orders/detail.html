<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Order #' + ${order.id} + ' — SkipsShop'">
        Order — SkipsShop
    </title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container mt-3">

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- Breadcrumb -->
        <p class="text-muted mb-2" style="font-size:0.88rem;">
            <a href="/orders" style="color:#e94560;">My Orders</a> ›
            Order #<span th:text="${order.id}"></span>
        </p>

        <div style="display:grid;
                grid-template-columns:1fr 340px;
                gap:2rem;
                align-items:start;">

            <!-- ── Left: Order Items ──────────────────────────────── -->
            <div>

                <!-- Order Items Card -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-bottom:1.5rem;">

                    <h3 style="font-size:1.1rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:1.2rem;">
                        Order Items
                    </h3>

                    <div th:each="item : ${order.orderItems}"
                         style="display:flex; align-items:center;
                            gap:1rem; padding:1rem 0;
                            border-bottom:1px solid #f0f0f0;">

                        <!-- Product image -->
                        <div style="width:64px; height:64px;
                                background:#f4f4f4; border-radius:8px;
                                display:flex; align-items:center;
                                justify-content:center; font-size:1.8rem;
                                overflow:hidden; flex-shrink:0;">
                            <img th:if="${item.productImageUrl != null
                                  and !item.productImageUrl.isEmpty()}"
                                 th:src="${item.productImageUrl}"
                                 th:alt="${item.productName}"
                                 style="width:100%; height:100%;
                                    object-fit:cover;"
                                 onerror="this.parentElement.innerHTML='🛍️'"/>
                            <span th:unless="${item.productImageUrl != null
                                       and !item.productImageUrl.isEmpty()}">
                            🛍️
                        </span>
                        </div>

                        <!-- Product info -->
                        <div style="flex:1;">
                            <a th:href="@{/products/{id}(id=${item.productId})}"
                               th:text="${item.productName}"
                               style="font-weight:600; color:#1a1a2e;">
                            </a>
                            <p class="text-muted" style="font-size:0.85rem;"
                               th:text="'Unit price: $'
                               + ${#numbers.formatDecimal(
                                   item.unitPrice, 1, 2)}">
                            </p>
                        </div>

                        <!-- Quantity -->
                        <div class="text-muted" style="font-size:0.9rem;"
                             th:text="'x' + ${item.quantity}">
                        </div>

                        <!-- Subtotal -->
                        <div style="font-weight:700; color:#e94560;
                                min-width:80px; text-align:right;"
                             th:text="'$' + ${#numbers.formatDecimal(
                                  item.subTotal, 1, 2)}">
                        </div>

                    </div>

                    <!-- Order Total -->
                    <div style="display:flex; justify-content:flex-end;
                            align-items:center; gap:1rem;
                            margin-top:1rem; padding-top:1rem;
                            border-top:2px solid #f0f0f0;">
                    <span style="font-size:1rem; color:#555;">
                        Order Total:
                    </span>
                        <span style="font-size:1.4rem; font-weight:900;
                                 color:#e94560;"
                              th:text="'$' + ${#numbers.formatDecimal(
                                   order.totalAmount, 1, 2)}">
                    </span>
                    </div>

                </div>

                <!-- Cancel button — only for PENDING orders -->
                <div th:if="${order.status == 'PENDING'}">
                    <form th:action="@{/orders/{id}/cancel(id=${order.id})}"
                          method="post"
                          onsubmit="return confirm(
                          'Are you sure you want to cancel this order?')">
                        <button type="submit" class="btn btn-danger">
                            ✕ Cancel Order
                        </button>
                    </form>
                </div>

            </div>

            <!-- ── Right: Order Summary ───────────────────────────── -->
            <div>

                <!-- Status Card -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-bottom:1.5rem;">

                    <h3 style="font-size:1.1rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:1.2rem;">
                        Order Summary
                    </h3>

                    <div style="display:flex; flex-direction:column;
                            gap:0.8rem;">

                        <div style="display:flex;
                                justify-content:space-between;">
                            <span class="text-muted">Order ID</span>
                            <strong th:text="'#' + ${order.id}"></strong>
                        </div>

                        <div style="display:flex;
                                justify-content:space-between;">
                            <span class="text-muted">Date</span>
                            <strong th:text="${#temporals.format(
                                          order.createdAt,
                                          'MMM dd, yyyy HH:mm')}">
                            </strong>
                        </div>

                        <div style="display:flex;
                                justify-content:space-between;
                                align-items:center;">
                            <span class="text-muted">Status</span>
                            <span class="badge"
                                  th:classappend="'badge-'
                                  + ${order.status.toLowerCase()}"
                                  th:text="${order.status}">
                        </span>
                        </div>

                        <div style="display:flex;
                                justify-content:space-between;">
                            <span class="text-muted">Payment</span>
                            <strong th:text="${order.paymentMethod}"></strong>
                        </div>

                        <hr style="border:none;
                               border-top:1px solid #f0f0f0;
                               margin:0.3rem 0;"/>

                        <div style="display:flex;
                                justify-content:space-between;">
                            <span class="text-muted">Total</span>
                            <strong style="color:#e94560; font-size:1.1rem;"
                                    th:text="'$' + ${#numbers.formatDecimal(
                                         order.totalAmount, 1, 2)}">
                            </strong>
                        </div>

                    </div>
                </div>

                <!-- Shipping Card -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-bottom:1.5rem;">

                    <h3 style="font-size:1.1rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:0.8rem;">
                        Shipping Address
                    </h3>

                    <p style="color:#555; line-height:1.6;"
                       th:text="${order.shippingAddress}">
                    </p>

                </div>

                <!-- Notes Card -->
                <div th:if="${order.notes != null and !order.notes.isEmpty()}"
                     style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <h3 style="font-size:1.1rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:0.8rem;">
                        Notes
                    </h3>

                    <p style="color:#555;" th:text="${order.notes}"></p>

                </div>

                <!-- Order Progress Tracker -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-top:1.5rem;">

                    <h3 style="font-size:1.1rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:1.2rem;">
                        Order Progress
                    </h3>

                    <div th:unless="${order.status == 'CANCELLED'}">
                        <div th:each="step, idx :
                             ${ {'PENDING','CONFIRMED','SHIPPED','DELIVERED'} }"
                             style="display:flex; align-items:center;
                                gap:0.8rem; margin-bottom:0.8rem;">

                            <!-- Step dot -->
                            <div th:with="
                             steps=${ {'PENDING','CONFIRMED',
                                       'SHIPPED','DELIVERED'} },
                             currentIdx=${
                                 order.status == 'PENDING'   ? 0 :
                                 order.status == 'CONFIRMED' ? 1 :
                                 order.status == 'SHIPPED'   ? 2 :
                                 order.status == 'DELIVERED' ? 3 : 0}"
                                 style="width:24px; height:24px;
                                    border-radius:50%;
                                    display:flex; align-items:center;
                                    justify-content:center;
                                    font-size:0.75rem; font-weight:700;
                                    flex-shrink:0;"
                                 th:style="${idx.index <= (
                                 order.status == 'PENDING'   ? 0 :
                                 order.status == 'CONFIRMED' ? 1 :
                                 order.status == 'SHIPPED'   ? 2 :
                                 order.status == 'DELIVERED' ? 3 : 0)}
                                 ? 'background:#e94560; color:white;'
                                 : 'background:#f0f0f0; color:#aaa;'">
                                <span th:text="${idx.index + 1}"></span>
                            </div>

                            <!-- Step label -->
                            <span th:text="${step}"
                                  th:style="${idx.index <= (
                                 order.status == 'PENDING'   ? 0 :
                                 order.status == 'CONFIRMED' ? 1 :
                                 order.status == 'SHIPPED'   ? 2 :
                                 order.status == 'DELIVERED' ? 3 : 0)}
                                 ? 'color:#1a1a2e; font-weight:600;'
                                 : 'color:#aaa;'">
                        </span>

                        </div>
                    </div>

                    <!-- Cancelled state -->
                    <div th:if="${order.status == 'CANCELLED'}"
                         class="alert alert-danger"
                         style="margin:0;">
                        This order was cancelled.
                    </div>

                </div>

            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
