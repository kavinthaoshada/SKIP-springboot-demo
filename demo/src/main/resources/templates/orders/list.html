<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Orders — SkipsShop</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container mt-3">

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- ── Header ────────────────────────────────────────────── -->
        <div class="section-header mb-3">
            <h2>My Orders</h2>
            <a href="/products" class="btn btn-outline btn-sm">
                🛍️ Continue Shopping
            </a>
        </div>

        <!-- ── Empty State ───────────────────────────────────────── -->
        <div class="empty-state"
             th:if="${orders.content.isEmpty()}">
            <h3>No orders yet</h3>
            <p>You haven't placed any orders yet.</p>
            <a href="/products" class="btn btn-primary mt-2">
                Start Shopping
            </a>
        </div>

        <!-- ── Orders Table ──────────────────────────────────────── -->
        <div class="table-wrapper"
             th:unless="${orders.content.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders.content}">

                    <td>
                        <strong th:text="'#' + ${order.id}"></strong>
                    </td>

                    <td th:text="${#temporals.format(
                                   order.createdAt,
                                   'MMM dd, yyyy')}">
                    </td>

                    <td>
                        <!-- Show first item name + count -->
                        <span th:if="${!order.orderItems.isEmpty()}"
                              th:text="${order.orderItems[0].productName}">
                        </span>
                        <span th:if="${order.orderItems.size() > 1}"
                              class="text-muted"
                              th:text="' +' + ${order.orderItems.size() - 1}
                                       + ' more'">
                        </span>
                    </td>

                    <td>
                        <strong style="color:#e94560;"
                                th:text="'$' + ${#numbers.formatDecimal(
                                         order.totalAmount, 1, 2)}">
                        </strong>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="'badge-'
                                  + ${order.status.toLowerCase()}"
                              th:text="${order.status}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/orders/{id}(id=${order.id})}"
                           class="btn btn-sm btn-secondary">
                            View
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

        <!-- ── Pagination ────────────────────────────────────────── -->
        <div class="pagination"
             th:if="${orders.totalPages > 1}">

            <a th:if="${orders.pageNumber > 0}"
               th:href="@{/orders(page=${orders.pageNumber - 1})}">
                ← Prev
            </a>

            <th:block th:each="i : ${#numbers.sequence(
                               0, orders.totalPages - 1)}">
                <a th:href="@{/orders(page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${i == orders.pageNumber}
                   ? 'active' : ''">
                </a>
            </th:block>

            <a th:if="${!orders.lastPage}"
               th:href="@{/orders(page=${orders.pageNumber + 1})}">
                Next →
            </a>

        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
