<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Listings — SkipsShop</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container mt-3">

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- Header -->
        <div class="section-header mb-3">
            <h2>My Listings</h2>
            <a href="/products/new" class="btn btn-primary btn-sm">
                + List New Item
            </a>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:if="${products.isEmpty()}">
            <h3>No listings yet</h3>
            <p>Start selling by listing your first product.</p>
            <a href="/products/new" class="btn btn-primary mt-2">
                List Your First Item
            </a>
        </div>

        <!-- Listings table -->
        <div class="table-wrapper" th:unless="${products.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">

                    <!-- Product name + image -->
                    <td>
                        <div class="d-flex align-center gap-1">
                            <div style="width:48px; height:48px;
                                        background:#f4f4f4;
                                        border-radius:6px;
                                        display:flex;
                                        align-items:center;
                                        justify-content:center;
                                        font-size:1.4rem;
                                        overflow:hidden;
                                        flex-shrink:0;">
                                <img th:if="${product.imageUrl != null
                                          and !product.imageUrl.isEmpty()}"
                                     th:src="${product.imageUrl}"
                                     th:alt="${product.name}"
                                     style="width:100%;height:100%;
                                            object-fit:cover;"
                                     onerror="this.parentElement.innerHTML='🛍️'"/>
                                <span th:unless="${product.imageUrl != null
                                               and !product.imageUrl.isEmpty()}">
                                    🛍️
                                </span>
                            </div>
                            <div>
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   th:text="${product.name}"
                                   style="font-weight:600; color:#1a1a2e;">
                                </a>
                            </div>
                        </div>
                    </td>

                    <td th:text="${product.categoryName}"></td>

                    <td style="font-weight:700; color:#e94560;"
                        th:text="'$' + ${#numbers.formatDecimal(
                                 product.price, 1, 2)}">
                    </td>

                    <td>
                        <span th:text="${product.stockQuantity}"
                              th:style="${product.stockQuantity == 0}
                                  ? 'color:#e74c3c; font-weight:700;'
                                  : (${product.stockQuantity} < 5
                                     ? 'color:#e67e22; font-weight:700;'
                                     : '')">
                        </span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="'badge-'
                                  + ${product.status.toLowerCase()}"
                              th:text="${product.status}">
                        </span>
                    </td>

                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/products/{id}/edit(id=${product.id})}"
                               class="btn btn-sm btn-secondary">
                                ✏️ Edit
                            </a>
                            <form th:action="@{/products/{id}/delete(id=${product.id})}"
                                  method="post"
                                  onsubmit="return confirm(
                                      'Delete this product?')">
                                <button type="submit"
                                        class="btn btn-sm btn-danger">
                                    🗑
                                </button>
                            </form>
                        </div>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
