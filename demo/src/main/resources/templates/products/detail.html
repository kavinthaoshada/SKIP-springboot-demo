<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${product.name} + ' — SkipsShop'">Product — SkipsShop</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container mt-3">

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- Breadcrumb -->
        <p class="text-muted mb-2" style="font-size:0.88rem;">
            <a href="/" style="color:#e94560;">Home</a> ›
            <a href="/products" style="color:#e94560;">Products</a> ›
            <span th:text="${product.name}"></span>
        </p>

        <!-- ── Product Detail Card ───────────────────────────────── -->
        <div class="product-detail">

            <!-- Left: Image -->
            <div class="product-detail-image">
                <img th:if="${product.imageUrl != null
                       and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}"
                     th:alt="${product.name}"
                     onerror="this.parentElement.innerHTML='🛍️'"/>
                <span th:unless="${product.imageUrl != null
                            and !product.imageUrl.isEmpty()}"
                      style="font-size:6rem;">🛍️</span>
            </div>

            <!-- Right: Info -->
            <div class="product-detail-info">

                <h1 th:text="${product.name}"></h1>

                <!-- Status badge -->
                <span class="badge"
                      th:classappend="'badge-' + ${product.status.toLowerCase()}"
                      th:text="${product.status}">
            </span>

                <!-- Price -->
                <div class="product-detail-price"
                     th:text="'$' + ${#numbers.formatDecimal(product.price,1,2)}">
                </div>

                <!-- Meta info -->
                <div class="product-detail-meta">
                <span>
                    📦 <strong>Seller:</strong>
                    <span th:text="${product.sellerUsername}"></span>
                </span>
                    <span>
                    🏷️ <strong>Category:</strong>
                    <a th:href="@{/products(categoryId=${product.categoryId})}"
                       th:text="${product.categoryName}"
                       style="color:#e94560;">
                    </a>
                </span>
                    <span th:if="${product.stockQuantity > 0}">
                    ✅ <strong>In Stock:</strong>
                    <span th:text="${product.stockQuantity}
                                   + ' units available'"></span>
                </span>
                    <span th:unless="${product.stockQuantity > 0}"
                          class="text-danger">
                    ❌ Out of Stock
                </span>
                </div>

                <!-- Description -->
                <p style="color:#555; line-height:1.7; margin-bottom:1.5rem;"
                   th:text="${product.description}">
                </p>

                <!-- ── Buyer: Add to order form ───────────────────── -->
                <div sec:authorize="hasAuthority('ROLE_BUYER')">
                    <div th:if="${product.stockQuantity > 0}">
                        <form th:action="@{/orders/quick-order}" method="post">
                            <!-- CSRF handled automatically by Thymeleaf th:action -->
                            <input type="hidden"
                                   name="productId"
                                   th:value="${product.id}"/>

                            <div class="quantity-selector">
                                <label for="quantity">Quantity:</label>
                                <input type="number"
                                       id="quantity"
                                       name="quantity"
                                       value="1"
                                       min="1"
                                       th:max="${product.stockQuantity}"/>
                            </div>

                            <div class="form-group">
                                <label for="shippingAddress">
                                    Shipping Address
                                </label>
                                <input type="text"
                                       id="shippingAddress"
                                       name="shippingAddress"
                                       class="form-control"
                                       placeholder="Enter your shipping address"
                                       required/>
                            </div>

                            <button type="submit"
                                    class="btn btn-primary btn-block">
                                🛒 Place Order
                            </button>
                        </form>
                    </div>
                    <div th:unless="${product.stockQuantity > 0}">
                        <button class="btn btn-outline btn-block" disabled>
                            Out of Stock
                        </button>
                    </div>
                </div>

                <!-- ── Seller: Edit / Delete buttons ─────────────── -->
                <div sec:authorize="hasAuthority('ROLE_SELLER')"
                     class="d-flex gap-1 mt-2">
                    <a th:href="@{/products/{id}/edit(id=${product.id})}"
                       class="btn btn-secondary">
                        ✏️ Edit
                    </a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post"
                          onsubmit="return confirm(
                          'Are you sure you want to delete this product?')">
                        <button type="submit" class="btn btn-danger">
                            🗑 Delete
                        </button>
                    </form>
                </div>

                <!-- ── Guest: Login prompt ────────────────────────── -->
                <div sec:authorize="isAnonymous()" class="mt-2">
                    <a href="/auth/login"
                       class="btn btn-primary btn-block">
                        Login to Purchase
                    </a>
                </div>

            </div>
        </div>
        <!-- End product detail card -->

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
