<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- Favicon -->
    <link rel="icon"
          type="image/x-icon"
          th:href="@{/favicon/favicon.ico}"/>
    <link rel="icon"
          type="image/png"
          sizes="32x32"
          th:href="@{/favicon/favicon-32x32.png}"/>
    <link rel="icon"
          type="image/png"
          sizes="16x16"
          th:href="@{/favicon/favicon-16x16.png}"/>
    <link rel="apple-touch-icon"
          sizes="180x180"
          th:href="@{/favicon/apple-touch-icon.png}"/>

    <title>Login — SkipsShop</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <a href="/" class="brand">Skips<span style="color:#1a1a2e">Shop</span></a>

        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        <!-- Alerts -->
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- Login Form -->
        <!-- th:action uses Thymeleaf URL so CSRF token is auto-appended -->
        <form th:action="@{/auth/login}" method="post">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        required
                        autofocus/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required/>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Sign In
            </button>

        </form>

        <div class="auth-footer">
            Don't have an account?
            <a href="/auth/register">Register here</a>
        </div>

        <!-- Demo credentials hint -->
        <div style="margin-top:1.5rem; padding:1rem;
                    background:#f9f9f9; border-radius:8px;
                    font-size:0.82rem; color:#888;">
            <strong style="color:#555;">Demo credentials:</strong><br/>
            🛒 Buyer &nbsp;— <code>alice / password123</code><br/>
            📦 Seller — <code>techstore / password123</code><br/>
            ⚙️ Admin &nbsp;— <code>admin / password123</code>
        </div>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
