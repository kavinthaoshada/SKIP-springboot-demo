<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>Products</title></head>
<body>

<th:block th:replace="~{admin/layout ::
    adminLayout(~{::title}, ~{::main})}">

    <title>Products — Admin</title>

    <main>
        <div class="admin-page-header">
            <div>
                <h1>📦 Products</h1>
                <p>Manage all product listings</p>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="admin-filter-bar">
            <input type="text"
                   id="productSearch"
                   placeholder="Search products..."
                   style="flex:1; max-width:400px;"/>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h2>All Products
                    <span class="text-muted"
                          style="font-weight:400;font-size:0.9rem;"
                          th:text="'(' + ${products.totalElements}
                               + ' total)'">
                </span>
                </h2>
                <div class="d-flex gap-1">
                    <a th:if="${products.pageNumber > 0}"
                       th:href="@{/admin/products(page=${products.pageNumber-1})}"
                       class="btn btn-sm btn-outline">← Prev</a>
                    <a th:if="${!products.lastPage}"
                       th:href="@{/admin/products(page=${products.pageNumber+1})}"
                       class="btn btn-sm btn-outline">Next →</a>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table" id="productsTable">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th>Seller</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products.content}">

                        <td>
                            <div style="display:flex;
                                        align-items:center;
                                        gap:0.7rem;">
                                <div style="width:40px;height:40px;
                                    background:#f4f4f4;border-radius:6px;
                                    display:flex;align-items:center;
                                    justify-content:center;
                                    font-size:1.2rem;overflow:hidden;
                                    flex-shrink:0;">
                                    <img th:if="${product.imageUrl!=null
                                              and !product.imageUrl.isEmpty()}"
                                         th:src="${product.imageUrl}"
                                         style="width:100%;height:100%;
                                                object-fit:cover;"
                                         onerror="this.parentElement
                                             .innerHTML='🛍️'"/>
                                    <span th:unless="${product.imageUrl!=null
                                                   and !product.imageUrl
                                                       .isEmpty()}">
                                        🛍️
                                    </span>
                                </div>
                                <div>
                                    <a th:href="@{/products/{id}(id=${product.id})}"
                                       th:text="${product.name}"
                                       style="font-weight:600;
                                              color:#1a1a2e;">
                                    </a>
                                </div>
                            </div>
                        </td>

                        <td th:text="${product.sellerUsername}">
                        </td>

                        <td th:text="${product.categoryName}">
                        </td>

                        <td style="font-weight:700;color:#e94560;"
                            th:text="'$'+${#numbers.formatDecimal(
                                     product.price,1,2)}">
                        </td>

                        <td th:text="${product.stockQuantity}">
                        </td>

                        <td>
                            <span class="badge"
                                  th:classappend="'badge-'
                                      + ${product.status.toLowerCase()}"
                                  th:text="${product.status}">
                            </span>
                        </td>

                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-secondary">
                                    View
                                </a>
                                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}"
                                      method="post">
                                    <button type="submit"
                                            class="btn btn-sm btn-danger"
                                            data-confirm="Delete this product?">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</th:block>

</body>
</html>
