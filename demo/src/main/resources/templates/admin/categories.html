<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>Categories</title></head>
<body>

<th:block th:replace="~{admin/layout ::
    adminLayout(~{::title}, ~{::main})}">

    <title>Categories — Admin</title>

    <main>
        <div class="admin-page-header">
            <div>
                <h1>🏷️ Categories</h1>
                <p>Manage product categories</p>
            </div>
        </div>

        <div style="display:grid;
                grid-template-columns:1fr 380px;
                gap:1.5rem;align-items:start;">

            <!-- Categories Table -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>All Categories
                        <span class="text-muted"
                              style="font-weight:400;font-size:0.9rem;"
                              th:text="'(' + ${categories.size()}
                                   + ' total)'">
                    </span>
                    </h2>
                </div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Parent</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cat : ${categories}">
                            <td>
                                <strong th:text="${cat.name}">
                                </strong>
                            </td>
                            <td th:text="${cat.parentName != null
                                        ? cat.parentName : '—'}">
                            </td>
                            <td class="text-muted"
                                th:text="${cat.description != null
                                    ? cat.description : '—'}">
                            </td>
                            <td>
                                <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}"
                                      method="post">
                                    <button type="submit"
                                            class="btn btn-sm btn-danger"
                                            data-confirm="Delete category? This will fail if products are assigned.">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Create Category Form -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>Add New Category</h2>
                </div>
                <div class="admin-card-body">
                    <form th:action="@{/admin/categories/create}"
                          th:object="${categoryRequest}"
                          method="post">

                        <div class="form-group">
                            <label>Category Name *</label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="e.g. Electronics"/>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <input type="text"
                                   th:field="*{description}"
                                   class="form-control"
                                   placeholder="Short description"/>
                        </div>

                        <div class="form-group">
                            <label>Parent Category</label>
                            <select th:field="*{parentId}"
                                    class="form-control">
                                <option value="">
                                    None (top-level)
                                </option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-primary btn-block">
                            + Create Category
                        </button>

                    </form>
                </div>
            </div>

        </div>
    </main>
</th:block>

</body>
</html>
