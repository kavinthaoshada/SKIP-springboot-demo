<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>Orders</title></head>
<body>

<th:block th:replace="~{admin/layout ::
    adminLayout(~{::title}, ~{::main})}">

    <title>Orders — Admin</title>

    <main>
        <div class="admin-page-header">
            <div>
                <h1>🛒 Orders</h1>
                <p>View and manage all customer orders</p>
            </div>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h2>All Orders</h2>
                <div class="d-flex gap-1">
                    <a th:if="${orders.number > 0}"
                       th:href="@{/admin/orders(page=${orders.number-1})}"
                       class="btn btn-sm btn-outline">← Prev</a>
                    <span class="text-muted"
                          style="font-size:0.85rem;
                             align-self:center;"
                          th:text="'Page ' + ${orders.number+1}
                               + ' of ' + ${orders.totalPages}">
                </span>
                    <a th:if="${!orders.last}"
                       th:href="@{/admin/orders(page=${orders.number+1})}"
                       class="btn btn-sm btn-outline">Next →</a>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Buyer</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Update</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders.content}">

                        <td>
                            <strong th:text="'#'+${order.id}">
                            </strong>
                        </td>

                        <td th:text="${order.buyer.username}">
                        </td>

                        <td th:text="${#temporals.format(
                                       order.createdAt,
                                       'MMM dd, yyyy')}">
                        </td>

                        <td th:text="${order.orderItems.size()}
                                     + ' item(s)'">
                        </td>

                        <td style="font-weight:700;color:#e94560;"
                            th:text="'$'+${#numbers.formatDecimal(
                                     order.totalAmount,1,2)}">
                        </td>

                        <td>
                            <span class="badge"
                                  th:classappend="'badge-'
                                      +${order.status.name()
                                                .toLowerCase()}"
                                  th:text="${order.status}">
                            </span>
                        </td>

                        <td>
                            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}"
                                  method="post"
                                  class="d-flex gap-1"
                                  th:if="${order.status.name()
                                      != 'DELIVERED'
                                      and order.status.name()
                                      != 'CANCELLED'}">
                                <select name="status"
                                        class="form-control"
                                        style="padding:0.3rem;
                                               font-size:0.8rem;
                                               width:120px;">
                                    <option
                                            th:each="s : ${orderStatuses}"
                                            th:value="${s}"
                                            th:text="${s}"
                                            th:selected="${s==order.status}">
                                    </option>
                                </select>
                                <button type="submit"
                                        class="btn btn-sm btn-success">
                                    ✓
                                </button>
                            </form>
                            <span th:if="${order.status.name()
                                        == 'DELIVERED'
                                        or order.status.name()
                                        == 'CANCELLED'}"
                                  class="text-muted"
                                  style="font-size:0.82rem;">
                                Finalized
                            </span>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</th:block>

</body>
</html>
