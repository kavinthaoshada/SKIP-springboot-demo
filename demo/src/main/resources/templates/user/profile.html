<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Profile — SkipShop</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container mt-3">

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div style="display:grid;
                grid-template-columns:280px 1fr;
                gap:2rem; align-items:start;">

            <!-- ── Left: Profile Card ─────────────────────────────── -->
            <div>
                <div style="background:white; border-radius:12px;
                        padding:2rem; text-align:center;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <!-- Avatar -->
                    <div style="width:80px; height:80px;
                            background:linear-gradient(
                                135deg, #e94560, #1a1a2e);
                            border-radius:50%;
                            display:flex; align-items:center;
                            justify-content:center;
                            font-size:2rem; color:white;
                            margin:0 auto 1rem;">
                    <span th:text="${#strings.toUpperCase(
                                    #strings.substring(
                                        user.username, 0, 1))}">
                    </span>
                    </div>

                    <!-- Name and username -->
                    <h3 style="font-size:1.2rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:0.2rem;"
                        th:text="${user.fullName}">
                    </h3>
                    <p class="text-muted"
                       style="font-size:0.88rem;"
                       th:text="'@' + ${user.username}">
                    </p>

                    <!-- Role badge -->
                    <span class="badge badge-active"
                          style="margin-top:0.5rem;"
                          th:text="${user.role.replace('ROLE_', '')}">
                </span>

                    <!-- Quick stats -->
                    <div style="margin-top:1.5rem;
                            padding-top:1.5rem;
                            border-top:1px solid #f0f0f0;">

                        <!-- Buyer stats -->
                        <div sec:authorize="hasAuthority('ROLE_BUYER')"
                             style="text-align:center;">
                            <a href="/orders"
                               style="color:#e94560; font-weight:600;
                                  font-size:0.9rem;">
                                View My Orders →
                            </a>
                        </div>

                        <!-- Seller stats -->
                        <div sec:authorize="hasAuthority('ROLE_SELLER')"
                             style="text-align:center;">
                            <a href="/products/my-listings"
                               style="color:#e94560; font-weight:600;
                                  font-size:0.9rem; display:block;
                                  margin-bottom:0.5rem;">
                                My Listings →
                            </a>
                            <a href="/orders/seller"
                               style="color:#1a1a2e; font-weight:600;
                                  font-size:0.9rem;">
                                Customer Orders →
                            </a>
                        </div>

                    </div>
                </div>

                <!-- Account Info Card -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-top:1.5rem;">

                    <h4 style="font-size:0.95rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:1rem;">
                        Account Info
                    </h4>

                    <div style="display:flex; flex-direction:column;
                            gap:0.8rem;">

                        <div>
                            <p class="text-muted"
                               style="font-size:0.78rem; margin-bottom:0.1rem;">
                                EMAIL
                            </p>
                            <p style="font-size:0.9rem; font-weight:600;
                                  word-break:break-all;"
                               th:text="${user.email}">
                            </p>
                        </div>

                        <div>
                            <p class="text-muted"
                               style="font-size:0.78rem; margin-bottom:0.1rem;">
                                MEMBER SINCE
                            </p>
                            <p style="font-size:0.9rem; font-weight:600;"
                               th:text="${#temporals.format(
                                      user.createdAt, 'MMM dd, yyyy')}">
                            </p>
                        </div>

                        <div>
                            <p class="text-muted"
                               style="font-size:0.78rem; margin-bottom:0.1rem;">
                                ACCOUNT STATUS
                            </p>
                            <span class="badge badge-active"
                                  th:if="${user.active}">Active</span>
                            <span class="badge badge-cancelled"
                                  th:unless="${user.active}">Inactive</span>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ── Right: Edit Profile Form ───────────────────────── -->
            <div>
                <div style="background:white; border-radius:12px;
                        padding:2rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <h3 style="font-size:1.2rem; font-weight:700;
                           color:#1a1a2e; margin-bottom:0.4rem;">
                        Edit Profile
                    </h3>
                    <p class="text-muted mb-3">
                        Update your personal information below.
                    </p>

                    <form th:action="@{/user/profile}" method="post">

                        <!-- Full Name -->
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text"
                                   id="fullName"
                                   name="fullName"
                                   class="form-control"
                                   th:value="${user.fullName}"
                                   placeholder="Your full name"/>
                        </div>

                        <!-- Email (read-only) -->
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email"
                                   class="form-control"
                                   th:value="${user.email}"
                                   disabled
                                   style="background:#f9f9f9;
                                      cursor:not-allowed;"/>
                            <small class="text-muted">
                                Email cannot be changed.
                            </small>
                        </div>

                        <!-- Username (read-only) -->
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text"
                                   class="form-control"
                                   th:value="${user.username}"
                                   disabled
                                   style="background:#f9f9f9;
                                      cursor:not-allowed;"/>
                            <small class="text-muted">
                                Username cannot be changed.
                            </small>
                        </div>

                        <!-- Phone -->
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input type="text"
                                   id="phoneNumber"
                                   name="phoneNumber"
                                   class="form-control"
                                   th:value="${user.phoneNumber}"
                                   placeholder="Your phone number"/>
                        </div>

                        <!-- Address -->
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text"
                                   id="address"
                                   name="address"
                                   class="form-control"
                                   th:value="${user.address}"
                                   placeholder="Your shipping address"/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-primary">
                                💾 Save Changes
                            </button>
                            <a href="/"
                               class="btn btn-outline">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>

                <!-- ── Danger Zone ────────────────────────────────── -->
                <div style="background:white; border-radius:12px;
                        padding:1.5rem;
                        box-shadow:0 2px 8px rgba(0,0,0,0.08);
                        margin-top:1.5rem;
                        border-left:4px solid #e74c3c;">

                    <h4 style="color:#e74c3c; margin-bottom:0.5rem;">
                        Sign Out
                    </h4>
                    <p class="text-muted"
                       style="font-size:0.88rem; margin-bottom:1rem;">
                        You will be redirected to the login page.
                    </p>
                    <form th:action="@{/auth/logout}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">
                            Logout
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
