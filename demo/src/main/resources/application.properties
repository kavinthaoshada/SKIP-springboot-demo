# ── Application ────────────────────────────────────────────
spring.application.name=ecommerce-demo
server.port=8080

# ── MySQL DataSource ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7e4c8f9a3a6d7c4b2e9f0a1b5
app.jwt.expiration-ms=86400000

# ── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Upload storage path ──────────────────────────────────────
app.upload.dir=uploads/products